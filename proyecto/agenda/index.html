<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Trabajo Premium</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="glass-background"></div>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="app-container">
        <header class="app-header">
            <div>
                <h1>Agenda de Trabajo</h1>
                <p id="current-date-display" class="subtitle">Organiza tu día con elegancia</p>
            </div>
            <div class="header-icon">
                <i class="fa-solid fa-calendar-check"></i>
            </div>
        </header>

        <main class="main-content">
            <!-- Sidebar for Adding Task -->
            <aside class="sidebar glass-panel">
                <h2><i class="fa-solid fa-plus-circle"></i> Nuevo Evento</h2>
                <form id="agenda-form">
                    <div class="form-group">
                        <label for="titulo">Nombre / Título</label>
                        <input type="text" id="titulo" placeholder="Ej. Reunión de Proyecto" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="fecha">Fecha</label>
                            <input type="date" id="fecha" required>
                        </div>
                        <div class="form-group">
                            <label for="hora">Hora</label>
                            <input type="time" id="hora" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="categoria">Categoría</label>
                        <select id="categoria" required>
                            <option value="trabajo">Trabajo</option>
                            <option value="reunion">Reunión</option>
                            <option value="personal">Personal</option>
                            <option value="urgente">Urgente</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" rows="3" placeholder="Detalles de la tarea..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Guardar Evento</button>
                </form>
            </aside>

            <!-- Main view for Tasks -->
            <section class="board glass-panel">
                <div class="board-header">
                    <h2>Próximos Eventos</h2>
                    <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">Todos</button>
                        <button class="filter-btn" data-filter="pending">Pendientes</button>
                        <button class="filter-btn" data-filter="completed">Completados</button>
                    </div>
                </div>

                <div class="tasks-container" id="tasks-container">
                    <!-- Tasks will be injected here by app.js -->
                    <div class="empty-state">
                        <i class="fa-regular fa-calendar-xmark"></i>
                        <p>No tienes eventos agendados.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
