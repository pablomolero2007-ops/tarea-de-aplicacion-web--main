<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Trabajo Premium</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="glass-background"></div>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="app-layout">
        <!-- Global Navigation Sidebar -->
        <nav class="main-nav glass-panel">
            <div class="nav-brand">
                <i class="fa-solid fa-briefcase"></i>
                <span>WorkFlow</span>
            </div>
            <ul class="nav-links">
                <li class="nav-item active" data-view="agenda">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>Mi Agenda</span>
                </li>
                <li class="nav-item" data-view="inbox">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Correos</span>
                    <span class="badge-count" id="inbox-count">3</span>
                </li>
            </ul>
        </nav>

        <!-- Dynamic Content Area -->
        <div class="views-container">

            <!-- AGENDA VIEW -->
            <div id="view-agenda" class="view active-view">
                <header class="app-header glass-panel">
                    <div>
                        <h1>Agenda de Trabajo</h1>
                        <p id="current-date-display" class="subtitle">Organiza tu día con elegancia</p>
                    </div>
                </header>

                <main class="agenda-layout">
                    <!-- Left: Form to Add Task -->
                    <aside class="sidebar glass-panel">
                        <h2><i class="fa-solid fa-plus-circle"></i> Nueva Cita</h2>
                        <form id="agenda-form">
                            <div class="form-group">
                                <label for="titulo">Nombre / Motivo</label>
                                <input type="text" id="titulo" placeholder="Ej. Reunión de Proyecto" required>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="fecha">Fecha</label>
                                    <input type="date" id="fecha" required>
                                </div>
                                <div class="form-group">
                                    <label for="hora">Hora</label>
                                    <input type="time" id="hora" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="categoria">Categoría</label>
                                <select id="categoria" required>
                                    <option value="trabajo">Trabajo</option>
                                    <option value="reunion">Reunión</option>
                                    <option value="personal">Personal</option>
                                    <option value="urgente">Urgente</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="descripcion">Descripción</label>
                                <textarea id="descripcion" rows="3" placeholder="Detalles de la cita..."></textarea>
                            </div>

                            <button type="submit" class="btn-primary">Guardar Cita</button>
                        </form>
                    </aside>

                    <!-- Center: Main Board for Tasks -->
                    <section class="board glass-panel">
                        <div class="board-header">
                            <h2>Próximas Citas</h2>
                            <div class="filter-group">
                                <button class="filter-btn active" data-filter="all">Todas</button>
                                <button class="filter-btn" data-filter="pending">Pendientes</button>
                            </div>
                        </div>
                        <div class="tasks-container" id="tasks-container">
                            <!-- Tasks injected here by app.js -->
                        </div>
                    </section>

                    <!-- Right: Calendar Component -->
                    <aside class="calendar-widget glass-panel">
                        <div class="calendar-header">
                            <button class="btn-icon-small" id="prev-month"><i
                                    class="fa-solid fa-chevron-left"></i></button>
                            <h3 id="calendar-month-year">May 2026</h3>
                            <button class="btn-icon-small" id="next-month"><i
                                    class="fa-solid fa-chevron-right"></i></button>
                        </div>
                        <div class="calendar-weekdays">
                            <span>Lu</span><span>Ma</span><span>Mi</span><span>Ju</span><span>Vi</span><span>Sa</span><span>Do</span>
                        </div>
                        <div class="calendar-grid" id="calendar-grid">
                            <!-- Calendar days injected here -->
                        </div>
                        <div class="calendar-legend">
                            <span class="legend-item">
                                <div class="legend-dot has-task"></div> Tiene cita
                            </span>
                            <span class="legend-item">
                                <div class="legend-dot is-today"></div> Leyenda: Hoy
                            </span>
                        </div>
                    </aside>
                </main>
            </div>

            <!-- INBOX VIEW -->
            <div id="view-inbox" class="view">
                <header class="app-header glass-panel">
                    <div>
                        <h1>Bandeja de Entrada</h1>
                        <p class="subtitle">Solicitudes de citas por correo</p>
                    </div>
                </header>

                <main class="inbox-layout">
                    <section class="inbox-list glass-panel" id="inbox-list">
                        <!-- Mock emails injected here -->
                    </section>
                </main>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
